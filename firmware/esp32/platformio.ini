[platformio]
default_envs = esp32dev_wireless

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200

[env:esp32dev_wireless_base]
# Shared ESP32 wireless settings used by both standard and Switch Lite builds.
board = esp32dev
framework = arduino, espidf
board_build.esp-idf.sdkconfig_path = sdkconfig.esp32dev_wireless
board_upload.flash_size = 2MB
build_flags =
  -DSWITCH_AUTO_DRAW_USE_CLASSIC_BT=1

[env:esp32dev_wireless]
# Standard Switch build (no SWITCH_LITE macro).
extends = env:esp32dev_wireless_base

[env:esp32dev_wireless_switch_lite]
# Switch Lite build: same hardware settings, plus SWITCH_LITE behavior flag.
extends = env:esp32dev_wireless_base
build_flags =
  ${env:esp32dev_wireless_base.build_flags}
  -DSWITCH_LITE=1

# Default target for generic ESP32-WROOM-32 / ESP-32S dev boards.
# Keep the image header explicit at 2MB so smaller flash clones do not boot
# with a stale 4MB expectation warning during wireless-controller pairing work.

[env:nodemcu_32s_wireless]
board = nodemcu-32s
framework = arduino, espidf
build_flags =
  -DSWITCH_AUTO_DRAW_USE_CLASSIC_BT=1

# Use this if your marketplace listing or silkscreen explicitly says NodeMCU-32S.

[env:xiao_esp32c3_serial]
board = seeed_xiao_esp32c3

# Optional legacy environment for protocol-only serial testing.
# Keep this around if you still want a second board for ACK smoke tests.

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

# Optional alternate hardware path for a future USB-HID implementation.
