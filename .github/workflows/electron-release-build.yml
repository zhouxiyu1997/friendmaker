name: Electron Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-26
            script: npm run dist:mac -- --arm64 --publish never
            artifact: friend-maker-macos-arm64
          - name: macOS x64
            os: macos-26-intel
            script: npm run dist:mac -- --x64 --publish never
            artifact: friend-maker-macos-x64
          - name: Windows x64
            os: windows-latest
            script: npm run dist:win:x64 -- --publish never
            artifact: friend-maker-windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Prepare Apple notarization key
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
        run: |
          set -euo pipefail

          for name in APPLE_API_ISSUER APPLE_API_KEY_BASE64 APPLE_API_KEY_ID CSC_KEY_PASSWORD CSC_LINK; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required GitHub Actions secret: ${name}"
              exit 1
            fi
          done

          key_path="$RUNNER_TEMP/apple/AuthKey_${APPLE_API_KEY_ID}.p8"
          mkdir -p "$(dirname "$key_path")"
          printf '%s' "$APPLE_API_KEY_BASE64" | /usr/bin/base64 -D > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Build signed macOS installer
        if: runner.os == 'macOS'
        run: ${{ matrix.script }}
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify macOS signature and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          app_path="$(find release -maxdepth 3 -name 'Friend Maker.app' -type d | head -n 1)"
          if [[ -z "$app_path" ]]; then
            echo "::error::Cannot find packaged Friend Maker.app under release/"
            find release -maxdepth 3 -print || true
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          spctl -a -vvv -t exec "$app_path"

      - name: Build unsigned Windows installer
        if: runner.os == 'Windows'
        run: ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
          if-no-files-found: error

      - name: Upload release assets
        shell: bash
        run: |
          shopt -s nullglob
          files=(release/*.dmg release/*.zip release/*.exe release/*.blockmap)
          if (( ${#files[@]} == 0 )); then
            echo "::error::No release assets found in release/"
            find release -maxdepth 2 -type f -print || true
            exit 1
          fi
          printf 'Uploading release asset: %s\n' "${files[@]}"
          gh release upload "${{ github.event.release.tag_name }}" "${files[@]}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
